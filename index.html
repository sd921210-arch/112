<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <script>
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyj7T7iLDRpIArgSYXb4KIbh48CoUAjCSRryt2uXIDj0ihA73X8wFZqQbl2R9SgTF-k/exec';
  </script>

  <title>AI 안전모 검사</title>

  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #64748b;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --ok: #16a34a;
      --ok-bg: #dcfce7;
      --ng: #dc2626;
      --ng-bg: #fee2e2;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', Arial, sans-serif;
      min-height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 14px;
    }

    .title {
      margin: 8px 0 14px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .sub {
      margin-top: -8px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 8px 26px rgba(15, 23, 42, 0.06);
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 7px;
    }

    input[type="text"] {
      width: 100%;
      height: 48px;
      border: 1px solid #cbd5e1;
      border-radius: 13px;
      padding: 0 13px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .field { margin-bottom: 12px; }

    .agree {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      border-radius: 13px;
      background: #f8fafc;
      border: 1px solid var(--line);
    }

    .agree input {
      width: 20px;
      height: 20px;
      margin-top: 1px;
      flex: 0 0 auto;
    }

    .agree span {
      font-size: 13px;
      color: #334155;
      line-height: 1.45;
    }

    .cameraBox {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #0f172a;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #111827;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      display: block;
      background: #0f172a;
    }

    .faceBlurCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 3;
    }

    .guideOval {
      position: absolute;
      left: 50%;
      top: 48%;
      width: 58%;
      height: 72%;
      transform: translate(-50%, -50%);
      border: 3px solid rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      pointer-events: none;
      box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.05);
      z-index: 4;
    }

    .cameraHint {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      color: white;
      font-size: 12px;
      text-align: center;
      background: rgba(15, 23, 42, 0.62);
      border-radius: 999px;
      padding: 8px 10px;
      backdrop-filter: blur(6px);
      z-index: 5;
    }

    .privacyBadge {
      position: absolute;
      left: 12px;
      top: 12px;
      color: white;
      font-size: 12px;
      font-weight: 800;
      background: rgba(15, 23, 42, 0.62);
      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: 999px;
      padding: 7px 10px;
      backdrop-filter: blur(6px);
      z-index: 5;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .privacyBadge.off {
      background: rgba(220, 38, 38, 0.78);
    }

    .btnRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 14px;
      height: 50px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btnSecondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .btnPrimary {
      background: var(--primary);
      color: white;
    }

    .btnPrimary:active { background: var(--primary-dark); }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .resultBox {
      display: none;
      border-radius: 18px;
      padding: 16px;
      margin-top: 12px;
      border: 1px solid var(--line);
    }

    .resultBox.ok {
      display: block;
      background: var(--ok-bg);
      border-color: #86efac;
      color: #14532d;
    }

    .resultBox.ng {
      display: block;
      background: var(--ng-bg);
      border-color: #fecaca;
      color: #7f1d1d;
    }

    .resultSign {
      font-size: 46px;
      font-weight: 900;
      letter-spacing: -0.06em;
      line-height: 1;
      margin-bottom: 8px;
    }

    .resultText {
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-line;
    }

    .pillGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .pill {
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 12px;
      padding: 9px 6px;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
      min-height: 20px;
      white-space: pre-line;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: -2px;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #captureCanvas { display: none; }
  </style>
</head>

<body>
  <div class="app">
    <h1 class="title">AI 안전모 검사</h1>
    <div class="sub">얼굴 부위는 흐림 처리하고, 안전모와 턱끈 착용 상태만 검사합니다.</div>

    <div class="card">
      <div class="field">
        <label for="nameInput">이름</label>
        <input id="nameInput" type="text" autocomplete="name" placeholder="예: 홍길동">
      </div>

      <div class="field">
        <label for="siteInput">현장명</label>
        <input id="siteInput" type="text" autocomplete="off" placeholder="예: 김해삼계 현장">
      </div>

      <label class="agree" for="consentInput">
        <input id="consentInput" type="checkbox">
        <span>현재 카메라 프레임을 AI 안전보호구 검사에 사용하고, 검사 결과를 스프레드시트에 저장하는 것에 동의합니다. 이미지는 저장하지 않습니다.</span>
      </label>
    </div>

    <div class="card">
      <div class="cameraBox" id="cameraBox">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="faceBlurCanvas" class="faceBlurCanvas"></canvas>
        <div id="privacyBadge" class="privacyBadge" role="button" tabindex="0">얼굴 흐림 처리</div>
        <div class="guideOval"></div>
        <div class="cameraHint">안전모 전체 · 턱끈이 보이게 맞춰주세요</div>
      </div>

      <div class="btnRow">
        <button id="cameraBtn" class="btnSecondary" type="button">카메라 켜기</button>
        <button id="analyzeBtn" class="btnPrimary" type="button" disabled>검사</button>
      </div>

      <div id="status" class="status"></div>

      <div id="resultBox" class="resultBox">
        <div id="resultSign" class="resultSign"></div>
        <div id="resultText" class="resultText"></div>
        <div class="pillGrid">
          <div id="helmetPill" class="pill">안전모 -</div>
          <div id="strapPill" class="pill">턱끈 -</div>
          <div id="facePill" class="pill">감지 -</div>
        </div>
      </div>
    </div>
  </div>

  <canvas id="captureCanvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const captureCanvas = document.getElementById('captureCanvas');
    const faceBlurCanvas = document.getElementById('faceBlurCanvas');
    const privacyBadge = document.getElementById('privacyBadge');
    const cameraBox = document.getElementById('cameraBox');
    const cameraBtn = document.getElementById('cameraBtn');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const statusEl = document.getElementById('status');
    const resultBox = document.getElementById('resultBox');
    const resultSign = document.getElementById('resultSign');
    const resultText = document.getElementById('resultText');
    const helmetPill = document.getElementById('helmetPill');
    const strapPill = document.getElementById('strapPill');
    const facePill = document.getElementById('facePill');
    const nameInput = document.getElementById('nameInput');
    const siteInput = document.getElementById('siteInput');
    const consentInput = document.getElementById('consentInput');

    const STORAGE_KEY = 'helmetSafetyInputs:v1';
    const STORAGE_TTL = 24 * 60 * 60 * 1000;
    const CAPTURE_SIZE = 288;
    const CAPTURE_QUALITY = 0.42;
    const FACE_DETECTION_INTERVAL = 120;
    const POLL_INTERVAL_MS = 1500;
    const POLL_MAX_COUNT = 100;
    const JSONP_TIMEOUT_MS = 9000;

    let stream = null;
    let isAnalyzing = false;
    let currentRequestId = '';
    let pollCount = 0;
    let pollTimer = null;
    let faceDetector = null;
    let detectorReady = false;
    let detectorUnavailable = false;
    let lastDetectedFace = null;
    let lastDetectionAt = 0;
    let blurLoopStarted = false;
    let faceBlurApplied = true;

    cameraBtn.addEventListener('click', toggleCamera);
    analyzeBtn.addEventListener('click', analyzeCurrentFrame);
    privacyBadge.addEventListener('click', toggleFaceBlur);
    privacyBadge.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' || event.key === ' ') {
        event.preventDefault();
        toggleFaceBlur();
      }
    });
    nameInput.addEventListener('input', saveSavedInputs);
    siteInput.addEventListener('input', saveSavedInputs);
    window.addEventListener('resize', resizeFaceBlurCanvas);

    window.addEventListener('load', () => {
      loadSavedInputs();
      initFaceDetector();
      updateFaceBlurBadge();
      updateCameraButtonState();
      setStatus('카메라를 허용해 주세요.');
      startCamera(true);
    });

    function loadSavedInputs() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;

        const saved = JSON.parse(raw);

        if (!saved || !saved.expiresAt || Date.now() > saved.expiresAt) {
          localStorage.removeItem(STORAGE_KEY);
          return;
        }

        nameInput.value = saved.name || '';
        siteInput.value = saved.siteName || '';
      } catch (err) {
        localStorage.removeItem(STORAGE_KEY);
      }
    }

    function saveSavedInputs() {
      const name = nameInput.value.trim();
      const siteName = siteInput.value.trim();

      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          name,
          siteName,
          expiresAt: Date.now() + STORAGE_TTL
        }));
      } catch (err) {}
    }

    function initFaceDetector() {
      try {
        if ('FaceDetector' in window) {
          faceDetector = new FaceDetector({
            fastMode: true,
            maxDetectedFaces: 1
          });
          detectorReady = true;
        } else {
          detectorUnavailable = true;
        }
      } catch (err) {
        faceDetector = null;
        detectorUnavailable = true;
      }
    }

    async function toggleCamera() {
      if (isAnalyzing) return;

      if (stream) {
        stopCamera();
      } else {
        await startCamera(false);
      }
    }

    async function startCamera(silent) {
      if (stream) {
        updateCameraButtonState();
        return;
      }

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus('카메라 기능을 지원하는 브라우저로 열어주세요.');
        updateCameraButtonState();
        return;
      }

      try {
        setStatus('카메라 준비 중');
        cameraBtn.disabled = true;

        const constraints = {
          audio: false,
          video: {
            facingMode: 'user',
            width: { ideal: 360 },
            height: { ideal: 360 }
          }
        };

        stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;

        await new Promise((resolve) => {
          video.onloadedmetadata = () => resolve();
        });

        await video.play();

        resizeFaceBlurCanvas();
        startFaceBlurLoop();

        analyzeBtn.disabled = false;
        updateCameraButtonState();
        setStatus('검사 준비 완료');
      } catch (err) {
        stream = null;
        video.srcObject = null;
        analyzeBtn.disabled = true;
        updateCameraButtonState();

        if (!silent) {
          setStatus(getCameraErrorMessage(err));
        } else {
          setStatus('카메라 켜기를 눌러주세요.');
        }
      }
    }

    function stopCamera() {
      if (!stream) {
        updateCameraButtonState();
        return;
      }

      try {
        stream.getTracks().forEach((track) => track.stop());
      } catch (err) {}

      stream = null;
      video.pause();
      video.srcObject = null;
      lastDetectedFace = null;
      clearFaceBlurCanvas();
      analyzeBtn.disabled = true;
      updateCameraButtonState();
      setStatus('카메라 꺼짐');
    }

    function pauseCameraForAnalysis() {
      if (!stream) return;

      try {
        video.pause();
      } catch (err) {}
    }

    async function resumeCameraAfterAnalysis() {
      if (!stream) return;

      try {
        await video.play();
      } catch (err) {}
    }

    function updateCameraButtonState() {
      cameraBtn.textContent = stream ? '카메라 끄기' : '카메라 켜기';
      cameraBtn.disabled = isAnalyzing;
      analyzeBtn.disabled = isAnalyzing || !stream || !video.videoWidth || !video.videoHeight;
    }

    function getCameraErrorMessage(err) {
      const name = err && err.name ? err.name : '';

      if (name === 'NotAllowedError') return '카메라 권한을 허용해 주세요.';
      if (name === 'NotFoundError') return '사용 가능한 카메라를 찾지 못했습니다.';
      if (name === 'NotReadableError') return '다른 앱이 카메라를 사용 중일 수 있습니다.';
      if (name === 'OverconstrainedError') return '카메라 설정을 불러오지 못했습니다.';

      return '카메라를 시작하지 못했습니다.';
    }

    function validateForm() {
      const name = nameInput.value.trim();
      const siteName = siteInput.value.trim();
      const consent = consentInput.checked;

      if (!GAS_WEB_APP_URL || !GAS_WEB_APP_URL.includes('/exec')) throw new Error('검사 주소 설정이 필요합니다.');
      if (!name) throw new Error('이름을 입력해 주세요.');
      if (!siteName) throw new Error('현장명을 입력해 주세요.');
      if (!consent) throw new Error('촬영동의 체크가 필요합니다.');
      if (!stream || !video.videoWidth || !video.videoHeight) throw new Error('카메라가 아직 준비되지 않았습니다.');

      return { name, siteName, consent };
    }

    function captureLowResJpeg() {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const cropSize = Math.min(vw, vh);
      const sx = Math.floor((vw - cropSize) / 2);
      const sy = Math.floor((vh - cropSize) / 2);

      captureCanvas.width = CAPTURE_SIZE;
      captureCanvas.height = CAPTURE_SIZE;

      const ctx = captureCanvas.getContext('2d', { willReadFrequently: false });
      ctx.clearRect(0, 0, CAPTURE_SIZE, CAPTURE_SIZE);
      ctx.drawImage(video, sx, sy, cropSize, cropSize, 0, 0, CAPTURE_SIZE, CAPTURE_SIZE);

      if (faceBlurApplied) {
        applyFaceBlurToCapture(ctx, sx, sy, cropSize);
      }

      return captureCanvas.toDataURL('image/jpeg', CAPTURE_QUALITY);
    }

    function applyFaceBlurToCapture(ctx, cropX, cropY, cropSize) {
      let box = null;

      if (lastDetectedFace) {
        const face = readFaceRect(lastDetectedFace);
        const scale = CAPTURE_SIZE / cropSize;

        box = {
          x: (face.x - cropX) * scale,
          y: (face.y - cropY) * scale,
          width: face.width * scale,
          height: face.height * scale
        };
      } else {
        const size = CAPTURE_SIZE * 0.4;
        box = {
          x: (CAPTURE_SIZE - size) / 2,
          y: CAPTURE_SIZE * 0.29,
          width: size,
          height: size * 1.2
        };
      }

      if (!box) return;

      const blurBox = expandBox(box, CAPTURE_SIZE, CAPTURE_SIZE, 1.08, 0.86, -0.16);
      blurCanvasArea(ctx, captureCanvas, blurBox, 9);
    }

    function blurCanvasArea(ctx, sourceCanvas, box, blurAmount) {
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = sourceCanvas.width;
      tempCanvas.height = sourceCanvas.height;

      const tempCtx = tempCanvas.getContext('2d');
      tempCtx.drawImage(sourceCanvas, 0, 0);

      ctx.save();
      makeOvalClip(ctx, box);
      ctx.filter = 'blur(' + blurAmount + 'px)';
      ctx.drawImage(tempCanvas, 0, 0);
      ctx.filter = 'none';
      ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
      ctx.fill();
      ctx.restore();
    }

    function makeRequestId() {
      return 'REQ-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
    }

    async function analyzeCurrentFrame() {
      if (isAnalyzing) return;

      let form;

      try {
        form = validateForm();
      } catch (err) {
        showError(err.message || String(err));
        return;
      }

      saveSavedInputs();

      const imageDataUrl = captureLowResJpeg();

      currentRequestId = makeRequestId();
      pollCount = 0;

      const payload = {
        requestId: currentRequestId,
        name: form.name,
        siteName: form.siteName,
        consent: form.consent,
        faceBlurApplied: faceBlurApplied,
        imageDataUrl,
        clientInfo: {
          userAgent: navigator.userAgent,
          screen: `${window.innerWidth}x${window.innerHeight} / dpr:${window.devicePixelRatio || 1}`,
          pageUrl: location.href,
          time: new Date().toISOString(),
          facePrivacy: faceBlurApplied ? 'blurred' : 'not_applied'
        }
      };

      isAnalyzing = true;
      pauseCameraForAnalysis();
      setControlsForAnalysis(true);
      analyzeBtn.innerHTML = '<span class="spinner"></span>검사 중';
      clearResult();
      setStatus('검사 중');

      try {
        postPayloadByHiddenForm(payload);
      } catch (err) {
        finishAsError('요청 전송에 실패했습니다. 네트워크 상태를 확인해 주세요.');
        return;
      }

      startPollingResult(currentRequestId);
    }

    function postPayloadByHiddenForm(payload) {
      const iframeName = 'gasPostFrame_' + payload.requestId.replace(/[^a-zA-Z0-9_]/g, '_');
      const iframe = document.createElement('iframe');
      iframe.name = iframeName;
      iframe.style.display = 'none';
      iframe.setAttribute('aria-hidden', 'true');
      document.body.appendChild(iframe);

      const form = document.createElement('form');
      form.method = 'POST';
      form.action = GAS_WEB_APP_URL;
      form.target = iframeName;
      form.style.display = 'none';
      form.acceptCharset = 'UTF-8';

      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = 'payload';
      input.value = JSON.stringify(payload);
      form.appendChild(input);

      document.body.appendChild(form);
      form.submit();

      setTimeout(() => {
        if (form.parentNode) form.parentNode.removeChild(form);
        if (iframe.parentNode) iframe.parentNode.removeChild(iframe);
      }, 120000);
    }

    function startPollingResult(requestId) {
      clearTimeout(pollTimer);

      pollTimer = setTimeout(() => {
        pollResult(requestId);
      }, POLL_INTERVAL_MS);
    }

    function pollResult(requestId) {
      pollCount++;

      if (pollCount > POLL_MAX_COUNT) {
        finishAsError('검사 응답이 지연되었습니다. 다시 검사해 주세요.');
        return;
      }

      setStatus('검사 중');

      const callbackName = '__gasResultCallback_' + requestId.replace(/[^a-zA-Z0-9_]/g, '_') + '_' + pollCount;
      const script = document.createElement('script');
      let settled = false;
      let guardTimer = null;

      function cleanup() {
        try {
          delete window[callbackName];
        } catch (err) {
          window[callbackName] = undefined;
        }

        if (guardTimer) {
          clearTimeout(guardTimer);
          guardTimer = null;
        }

        if (script && script.parentNode) {
          script.parentNode.removeChild(script);
        }
      }

      function retryLater() {
        if (settled) return;
        settled = true;
        cleanup();
        startPollingResult(requestId);
      }

      window[callbackName] = function(data) {
        if (settled) return;
        settled = true;
        cleanup();

        if (!data || data.status === 'PENDING') {
          startPollingResult(requestId);
          return;
        }

        if (data.status === 'ERROR' || data.success === false) {
          finishAsError(data.message || '검사 중 오류가 발생했습니다.');
          return;
        }

        if (data.status === 'DONE' && data.success) {
          finishAsSuccess(data);
          return;
        }

        startPollingResult(requestId);
      };

      script.src =
        GAS_WEB_APP_URL +
        '?action=result' +
        '&requestId=' + encodeURIComponent(requestId) +
        '&callback=' + encodeURIComponent(callbackName) +
        '&t=' + Date.now() + '_' + Math.random().toString(36).slice(2);

      script.onerror = retryLater;

      guardTimer = setTimeout(() => {
        retryLater();
      }, JSONP_TIMEOUT_MS);

      document.body.appendChild(script);
    }

    async function finishAsSuccess(data) {
      clearTimeout(pollTimer);
      showResult(data.result);
      await resumeCameraAfterAnalysis();
      isAnalyzing = false;
      analyzeBtn.textContent = '검사';
      setControlsForAnalysis(false);
      updateCameraButtonState();
    }

    async function finishAsError(message) {
      clearTimeout(pollTimer);
      showError(message);
      await resumeCameraAfterAnalysis();
      isAnalyzing = false;
      analyzeBtn.textContent = '검사';
      setControlsForAnalysis(false);
      updateCameraButtonState();
    }

    function showResult(result) {
      const isOk = result.overall === 'OK';

      resultBox.className = 'resultBox ' + (isOk ? 'ok' : 'ng');
      resultSign.textContent = isOk ? 'OK' : 'NG';
      resultText.textContent = `${result.reason || ''}\n${result.action || ''}`;

      helmetPill.textContent = '안전모 ' + (result.hardhat || '-');
      strapPill.textContent = '턱끈 ' + (result.chinstrap || '-');
      facePill.textContent = '감지 ' + (result.personVisible ? 'Y' : 'N');

      setStatus('검사 완료');
    }

    function showError(message) {
      const safeMessage = getSafeErrorMessage(message);
      resultBox.className = 'resultBox ng';
      resultSign.textContent = 'NG';
      resultText.textContent = safeMessage;
      helmetPill.textContent = '안전모 -';
      strapPill.textContent = '턱끈 -';
      facePill.textContent = '감지 -';
      setStatus(safeMessage);
    }

    function getSafeErrorMessage(message) {
      const text = String(message || '').trim();

      if (!text) return '검사 응답이 지연되었습니다. 다시 검사해 주세요.';
      if (/AI|Gemini|JSON|파싱|HTTP|API/i.test(text)) return '검사 판독이 불안정합니다. 다시 검사해 주세요.';

      return text;
    }

    function clearResult() {
      resultBox.className = 'resultBox';
      resultSign.textContent = '';
      resultText.textContent = '';
      helmetPill.textContent = '안전모 -';
      strapPill.textContent = '턱끈 -';
      facePill.textContent = '감지 -';
    }

    function setStatus(message) {
      statusEl.textContent = message || '';
    }

    function setControlsForAnalysis(disabled) {
      cameraBtn.disabled = disabled;
      analyzeBtn.disabled = disabled;
      nameInput.disabled = disabled;
      siteInput.disabled = disabled;
      consentInput.disabled = disabled;
      privacyBadge.style.pointerEvents = disabled ? 'none' : 'auto';
      privacyBadge.style.opacity = disabled ? '0.65' : '1';
    }

    function toggleFaceBlur() {
      if (isAnalyzing) return;

      faceBlurApplied = !faceBlurApplied;
      updateFaceBlurBadge();

      if (!faceBlurApplied) {
        clearFaceBlurCanvas();
      }
    }

    function updateFaceBlurBadge() {
      privacyBadge.textContent = faceBlurApplied ? '얼굴 흐림 처리' : '얼굴 흐림 미적용';
      privacyBadge.classList.toggle('off', !faceBlurApplied);
    }

    function clearFaceBlurCanvas() {
      const ctx = faceBlurCanvas.getContext('2d');
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, faceBlurCanvas.width, faceBlurCanvas.height);
    }

    function resizeFaceBlurCanvas() {
      const rect = cameraBox.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;

      if (!rect.width || !rect.height) return;

      const targetWidth = Math.round(rect.width * dpr);
      const targetHeight = Math.round(rect.height * dpr);

      if (faceBlurCanvas.width !== targetWidth || faceBlurCanvas.height !== targetHeight) {
        faceBlurCanvas.width = targetWidth;
        faceBlurCanvas.height = targetHeight;
        faceBlurCanvas.style.width = rect.width + 'px';
        faceBlurCanvas.style.height = rect.height + 'px';
      }
    }

    function startFaceBlurLoop() {
      if (blurLoopStarted) return;

      blurLoopStarted = true;
      requestAnimationFrame(drawFaceBlurLoop);
    }

    async function drawFaceBlurLoop() {
      resizeFaceBlurCanvas();

      if (stream && video.videoWidth && video.videoHeight) {
        await updateFaceDetection();
        drawFaceBlurOverlay();
      }

      requestAnimationFrame(drawFaceBlurLoop);
    }

    async function updateFaceDetection() {
      const now = Date.now();

      if (!detectorReady || detectorUnavailable || !faceDetector) {
        return;
      }

      if (now - lastDetectionAt < FACE_DETECTION_INTERVAL) {
        return;
      }

      lastDetectionAt = now;

      try {
        const faces = await faceDetector.detect(video);
        lastDetectedFace = faces && faces.length ? faces[0].boundingBox : null;
      } catch (err) {
        lastDetectedFace = null;
        detectorUnavailable = true;
      }
    }

    function drawFaceBlurOverlay() {
      const dpr = window.devicePixelRatio || 1;
      const width = faceBlurCanvas.width / dpr;
      const height = faceBlurCanvas.height / dpr;
      const ctx = faceBlurCanvas.getContext('2d');

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, width, height);

      if (!faceBlurApplied) return;

      let faceBox = null;

      if (lastDetectedFace) {
        faceBox = mapVideoFaceToCanvas(lastDetectedFace, width, height);
      } else {
        faceBox = getFallbackFaceBox(width, height);
      }

      if (!faceBox) return;

      const blurBox = expandBox(faceBox, width, height, 1.10, 0.92, -0.14);
      drawBlurredVideoPatch(ctx, blurBox, width, height);
    }

    function drawBlurredVideoPatch(ctx, box, canvasWidth, canvasHeight) {
      const cover = getVideoCoverRect(canvasWidth, canvasHeight);

      ctx.save();
      makeOvalClip(ctx, box);
      ctx.filter = 'blur(14px)';
      ctx.translate(canvasWidth, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, cover.x, cover.y, cover.width, cover.height);
      ctx.restore();

      ctx.save();
      makeOvalClip(ctx, box);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.16)';
      ctx.fill();
      ctx.lineWidth = 2;
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.42)';
      ctx.stroke();
      ctx.restore();
    }

    function getVideoCoverRect(canvasWidth, canvasHeight) {
      const videoWidth = video.videoWidth;
      const videoHeight = video.videoHeight;
      const scale = Math.max(canvasWidth / videoWidth, canvasHeight / videoHeight);
      const width = videoWidth * scale;
      const height = videoHeight * scale;

      return {
        x: (canvasWidth - width) / 2,
        y: (canvasHeight - height) / 2,
        width,
        height
      };
    }

    function mapVideoFaceToCanvas(faceRect, canvasWidth, canvasHeight) {
      const face = readFaceRect(faceRect);
      const cover = getVideoCoverRect(canvasWidth, canvasHeight);
      const scale = cover.width / video.videoWidth;

      const x = cover.x + face.x * scale;
      const y = cover.y + face.y * scale;
      const w = face.width * scale;
      const h = face.height * scale;

      return {
        x: canvasWidth - (x + w),
        y,
        width: w,
        height: h
      };
    }

    function readFaceRect(faceRect) {
      return {
        x: typeof faceRect.x === 'number' ? faceRect.x : (faceRect.left || 0),
        y: typeof faceRect.y === 'number' ? faceRect.y : (faceRect.top || 0),
        width: faceRect.width || 0,
        height: faceRect.height || 0
      };
    }

    function getFallbackFaceBox(width, height) {
      const size = Math.min(width, height) * 0.38;

      return {
        x: (width - size) / 2,
        y: height * 0.29,
        width: size,
        height: size * 1.2
      };
    }

    function expandBox(box, limitWidth, limitHeight, widthScale, heightScale, yOffsetRatio) {
      const cx = box.x + box.width / 2;
      const cy = box.y + box.height / 2 + box.height * (yOffsetRatio || 0);
      const width = box.width * widthScale;
      const height = box.height * heightScale;

      return {
        x: Math.max(0, cx - width / 2),
        y: Math.max(0, cy - height / 2),
        width: Math.min(width, limitWidth),
        height: Math.min(height, limitHeight)
      };
    }

    function makeOvalClip(ctx, box) {
      ctx.beginPath();
      ctx.ellipse(
        box.x + box.width / 2,
        box.y + box.height / 2,
        box.width / 2,
        box.height / 2,
        0,
        0,
        Math.PI * 2
      );
      ctx.clip();
    }
  </script>
</body>
