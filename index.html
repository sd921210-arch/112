<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

  <script>
    const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbyIiD_UKjwGssNxf090ZjnNqv46VhVXcE0D6fOj9ykCnO86rYMns_g-jmMaYnlCr63g/exec';
  </script>

  <title>AI 안전모 검사</title>

  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #64748b;
      --line: #e5e7eb;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --ok-bg: #dcfce7;
      --ok-border: #86efac;
      --ok-text: #14532d;
      --ng-bg: #fee2e2;
      --ng-border: #fecaca;
      --ng-text: #7f1d1d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans KR', Arial, sans-serif;
      min-height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 14px;
    }

    .title {
      margin: 8px 0 14px;
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .sub {
      margin-top: -8px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 8px 26px rgba(15, 23, 42, 0.06);
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 7px;
    }

    input[type="text"] {
      width: 100%;
      height: 48px;
      border: 1px solid #cbd5e1;
      border-radius: 13px;
      padding: 0 13px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
    }

    .field { margin-bottom: 12px; }

    .agree {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      border-radius: 13px;
      background: #f8fafc;
      border: 1px solid var(--line);
    }

    .agree input {
      width: 20px;
      height: 20px;
      margin-top: 1px;
      flex: 0 0 auto;
    }

    .agree span {
      font-size: 13px;
      color: #334155;
      line-height: 1.45;
    }

    .cameraBox {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #0f172a;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #111827;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      display: block;
      background: #0f172a;
    }

    .faceBlurCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .privacyBadge {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      background: rgba(15, 23, 42, 0.68);
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
      backdrop-filter: blur(6px);
      z-index: 2;
    }

    .privacyBadge.off {
      background: rgba(220, 38, 38, 0.78);
    }

    .cameraHint {
      position: absolute;
      left: 12px;
      right: 12px;
      bottom: 12px;
      color: white;
      font-size: 12px;
      text-align: center;
      background: rgba(15, 23, 42, 0.6);
      border-radius: 999px;
      padding: 8px 10px;
      backdrop-filter: blur(6px);
    }

    .btnRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    button {
      border: 0;
      border-radius: 14px;
      height: 50px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .btnSecondary {
      background: #e2e8f0;
      color: #0f172a;
    }

    .btnPrimary {
      background: var(--primary);
      color: white;
    }

    .btnPrimary:active { background: var(--primary-dark); }

    button:disabled,
    input:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .resultBox {
      display: none;
      border-radius: 18px;
      padding: 16px;
      margin-top: 12px;
      border: 1px solid var(--line);
    }

    .resultBox.ok {
      display: block;
      background: var(--ok-bg);
      border-color: var(--ok-border);
      color: var(--ok-text);
    }

    .resultBox.ng {
      display: block;
      background: var(--ng-bg);
      border-color: var(--ng-border);
      color: var(--ng-text);
    }

    .resultSign {
      font-size: 46px;
      font-weight: 900;
      letter-spacing: -0.06em;
      line-height: 1;
      margin-bottom: 8px;
    }

    .resultText {
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-line;
    }

    .pillGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .pill {
      background: rgba(255, 255, 255, 0.62);
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 12px;
      padding: 9px 6px;
      text-align: center;
      font-size: 12px;
      font-weight: 800;
    }

    .status {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.45;
      min-height: 20px;
      white-space: pre-line;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255, 255, 255, 0.5);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: -2px;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #captureCanvas { display: none; }
  </style>
</head>

<body>
  <div class="app">
    <h1 class="title">AI 안전모 검사</h1>
    <div class="sub">카메라 화면에 안전모와 턱끈이 보이게 맞춘 뒤 검사하세요.</div>

    <div class="card">
      <div class="field">
        <label for="nameInput">이름</label>
        <input id="nameInput" type="text" autocomplete="name" placeholder="예: 홍길동">
      </div>

      <div class="field">
        <label for="siteInput">현장명</label>
        <input id="siteInput" type="text" autocomplete="off" placeholder="예: 김해삼계 현장">
      </div>

      <label class="agree" for="consentInput">
        <input id="consentInput" type="checkbox">
        <span>촬영 화면의 현재 프레임을 AI 안전보호구 분석에 사용하고, 검사 결과가 스프레드시트에 저장되는 것에 동의합니다. 이미지는 시트에 저장하지 않습니다.</span>
      </label>
    </div>

    <div class="card">
      <div id="cameraBox" class="cameraBox">
        <video id="video" autoplay muted playsinline></video>
        <canvas id="faceBlurCanvas" class="faceBlurCanvas"></canvas>
        <div id="privacyBadge" class="privacyBadge" role="button" tabindex="0">얼굴 흐림 처리</div>
        <div class="cameraHint">안전모 전체와 턱끈이 보이게 맞춰주세요</div>
      </div>

      <div class="btnRow">
        <button id="cameraBtn" class="btnSecondary" type="button">카메라 켜기</button>
        <button id="analyzeBtn" class="btnPrimary" type="button" disabled>검사</button>
      </div>

      <div id="status" class="status"></div>

      <div id="resultBox" class="resultBox">
        <div id="resultSign" class="resultSign"></div>
        <div id="resultText" class="resultText"></div>
        <div class="pillGrid">
          <div id="helmetPill" class="pill">안전모 -</div>
          <div id="strapPill" class="pill">턱끈 -</div>
          <div id="facePill" class="pill">감지 -</div>
        </div>
      </div>
    </div>
  </div>

  <canvas id="captureCanvas"></canvas>

  <script>
    const video = document.getElementById('video');
    const captureCanvas = document.getElementById('captureCanvas');
    const faceBlurCanvas = document.getElementById('faceBlurCanvas');
    const cameraBox = document.getElementById('cameraBox');
    const cameraBtn = document.getElementById('cameraBtn');
    const analyzeBtn = document.getElementById('analyzeBtn');
    const statusEl = document.getElementById('status');
    const resultBox = document.getElementById('resultBox');
    const resultSign = document.getElementById('resultSign');
    const resultText = document.getElementById('resultText');
    const helmetPill = document.getElementById('helmetPill');
    const strapPill = document.getElementById('strapPill');
    const facePill = document.getElementById('facePill');
    const nameInput = document.getElementById('nameInput');
    const siteInput = document.getElementById('siteInput');
    const consentInput = document.getElementById('consentInput');
    const privacyBadge = document.getElementById('privacyBadge');

    const SAVED_INPUT_KEY = 'safetyInspectionInputsV1';
    const SAVED_INPUT_TTL = 24 * 60 * 60 * 1000;
    const CAPTURE_MAX_SIDE = 480;
    const CAPTURE_QUALITY = 0.5;
    const POLL_DELAY = 2200;
    const POLL_MAX_COUNT = 75;
    const FACE_DETECTION_INTERVAL = 450;

    let stream = null;
    let isAnalyzing = false;
    let currentRequestId = '';
    let pollCount = 0;
    let pollTimer = null;
    let faceDetector = null;
    let detectorReady = false;
    let detectorUnavailable = false;
    let lastDetectedFace = null;
    let lastDetectionAt = 0;
    let blurLoopStarted = false;
    let faceBlurApplied = true;

    cameraBtn.addEventListener('click', toggleCamera);
    analyzeBtn.addEventListener('click', analyzeCurrentFrame);
    privacyBadge.addEventListener('click', toggleFaceBlur);
    privacyBadge.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggleFaceBlur();
      }
    });
    nameInput.addEventListener('input', saveSavedInputs);
    siteInput.addEventListener('input', saveSavedInputs);
    window.addEventListener('resize', resizeFaceBlurCanvas);

    window.addEventListener('load', function() {
      loadSavedInputs();
      updateFaceBlurBadge();
      initFaceDetector();
      startFaceBlurLoop();
      updateCameraButtonState();
      setStatus('카메라를 켜고 검사하세요.');
      startCamera(true);
    });

    function loadSavedInputs() {
      try {
        const raw = localStorage.getItem(SAVED_INPUT_KEY);
        if (!raw) return;

        const saved = JSON.parse(raw);
        if (!saved || !saved.savedAt || Date.now() - saved.savedAt > SAVED_INPUT_TTL) {
          localStorage.removeItem(SAVED_INPUT_KEY);
          return;
        }

        if (saved.name) nameInput.value = saved.name;
        if (saved.siteName) siteInput.value = saved.siteName;
      } catch (err) {}
    }

    function saveSavedInputs() {
      try {
        localStorage.setItem(SAVED_INPUT_KEY, JSON.stringify({
          name: nameInput.value.trim(),
          siteName: siteInput.value.trim(),
          savedAt: Date.now()
        }));
      } catch (err) {}
    }

    function initFaceDetector() {
      try {
        if ('FaceDetector' in window) {
          faceDetector = new FaceDetector({ fastMode: true, maxDetectedFaces: 1 });
          detectorReady = true;
        }
      } catch (err) {
        detectorUnavailable = true;
      }
    }

    async function toggleCamera() {
      if (isAnalyzing) return;
      if (stream) {
        stopCamera();
      } else {
        await startCamera(false);
      }
    }

    async function startCamera(silent) {
      if (stream) return;

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        setStatus('이 브라우저는 카메라 기능을 지원하지 않습니다. Chrome 또는 Samsung Internet으로 열어주세요.');
        return;
      }

      try {
        setStatus('카메라 준비 중');

        const constraints = {
          audio: false,
          video: {
            facingMode: 'user',
            width: { ideal: 640 },
            height: { ideal: 640 }
          }
        };

        stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;

        await new Promise(function(resolve) {
          video.onloadedmetadata = function() { resolve(); };
        });

        await video.play();
        setStatus('카메라 준비 완료');
        updateCameraButtonState();
      } catch (err) {
        stream = null;
        video.srcObject = null;
        updateCameraButtonState();
        if (!silent) {
          setStatus(getCameraErrorMessage(err));
        } else {
          setStatus('카메라 켜기를 눌러 권한을 허용해 주세요.');
        }
      }
    }

    function stopCamera() {
      clearTimeout(pollTimer);
      if (stream) {
        stream.getTracks().forEach(function(track) {
          try { track.stop(); } catch (err) {}
        });
      }
      stream = null;
      video.pause();
      video.srcObject = null;
      lastDetectedFace = null;
      clearFaceBlurCanvas();
      setStatus('카메라 꺼짐');
      updateCameraButtonState();
    }

    function getCameraErrorMessage(err) {
      const name = err && err.name ? err.name : '';
      if (name === 'NotAllowedError') return '카메라 권한을 허용해 주세요.';
      if (name === 'NotFoundError') return '사용 가능한 카메라를 찾지 못했습니다.';
      if (name === 'NotReadableError') return '다른 앱이 카메라를 사용 중일 수 있습니다.';
      return '카메라를 시작하지 못했습니다.';
    }

    function updateCameraButtonState() {
      cameraBtn.textContent = stream ? '카메라 끄기' : '카메라 켜기';
      cameraBtn.disabled = isAnalyzing;
      analyzeBtn.disabled = isAnalyzing || !stream || !video.videoWidth || !video.videoHeight;
    }

    function setControlsForAnalysis(disabled) {
      nameInput.disabled = disabled;
      siteInput.disabled = disabled;
      consentInput.disabled = disabled;
      cameraBtn.disabled = disabled;
      analyzeBtn.disabled = disabled;
      privacyBadge.style.pointerEvents = disabled ? 'none' : 'auto';
      privacyBadge.style.opacity = disabled ? '0.65' : '1';
    }

    function validateForm() {
      const name = nameInput.value.trim();
      const siteName = siteInput.value.trim();
      const consent = consentInput.checked;

      if (!GAS_WEB_APP_URL || !GAS_WEB_APP_URL.includes('/exec')) throw new Error('검사 주소 설정이 필요합니다.');
      if (!name) throw new Error('이름을 입력해 주세요.');
      if (!siteName) throw new Error('현장명을 입력해 주세요.');
      if (!consent) throw new Error('촬영동의 체크가 필요합니다.');
      if (!stream || !video.videoWidth || !video.videoHeight) throw new Error('카메라가 아직 준비되지 않았습니다.');

      return { name: name, siteName: siteName, consent: consent };
    }

    function captureInspectionJpeg() {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const scale = Math.min(CAPTURE_MAX_SIDE / Math.max(vw, vh), 1);
      const outputWidth = Math.max(300, Math.round(vw * scale));
      const outputHeight = Math.max(300, Math.round(vh * scale));

      captureCanvas.width = outputWidth;
      captureCanvas.height = outputHeight;

      const ctx = captureCanvas.getContext('2d', { willReadFrequently: false });
      ctx.clearRect(0, 0, outputWidth, outputHeight);
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'medium';
      ctx.drawImage(video, 0, 0, outputWidth, outputHeight);

      if (faceBlurApplied) {
        applyFaceBlurToCapture(ctx, outputWidth, outputHeight, outputWidth / vw, outputHeight / vh);
      }

      return captureCanvas.toDataURL('image/jpeg', CAPTURE_QUALITY);
    }

    function applyFaceBlurToCapture(ctx, outputWidth, outputHeight, scaleX, scaleY) {
      let box;

      if (lastDetectedFace) {
        const face = readFaceRect(lastDetectedFace);
        box = {
          x: face.x * scaleX,
          y: face.y * scaleY,
          width: face.width * scaleX,
          height: face.height * scaleY
        };
      } else {
        box = getFallbackFaceBox(outputWidth, outputHeight);
      }

      const blurBox = makePrivacyFaceBox(box, outputWidth, outputHeight);
      blurCanvasArea(ctx, captureCanvas, blurBox, 36, false);
    }

    function makeRequestId() {
      return 'REQ-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
    }

    async function analyzeCurrentFrame() {
      if (isAnalyzing) return;

      let form;
      try {
        form = validateForm();
      } catch (err) {
        showError(err.message || String(err));
        return;
      }

      saveSavedInputs();
      clearResult();

      const imageDataUrl = captureInspectionJpeg();
      currentRequestId = makeRequestId();
      pollCount = 0;
      isAnalyzing = true;
      try { video.pause(); } catch (err) {}
      setControlsForAnalysis(true);
      analyzeBtn.innerHTML = '<span class="spinner"></span>검사 중';
      setStatus('검사 중');

      const payload = {
        requestId: currentRequestId,
        name: form.name,
        siteName: form.siteName,
        consent: form.consent,
        faceBlurApplied: faceBlurApplied,
        imageDataUrl: imageDataUrl,
        clientInfo: {
          userAgent: navigator.userAgent,
          screen: window.innerWidth + 'x' + window.innerHeight + ' / dpr:' + (window.devicePixelRatio || 1),
          pageUrl: location.href,
          videoSize: video.videoWidth + 'x' + video.videoHeight,
          captureSize: captureCanvas.width + 'x' + captureCanvas.height,
          faceDetected: !!lastDetectedFace,
          facePrivacy: faceBlurApplied ? 'blurred' : 'not_applied',
          time: new Date().toISOString()
        }
      };

      try {
        await fetch(GAS_WEB_APP_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
      } catch (err) {
        finishAsError('요청 전송에 실패했습니다. 네트워크 상태를 확인해 주세요.');
        return;
      }

      startPollingResult(currentRequestId);
    }

    function startPollingResult(requestId) {
      clearTimeout(pollTimer);
      pollTimer = setTimeout(function() {
        pollResult(requestId);
      }, POLL_DELAY);
    }

    function pollResult(requestId) {
      pollCount++;

      if (pollCount > POLL_MAX_COUNT) {
        finishAsError('검사 결과를 받지 못했습니다. 다시 검사해 주세요.\n요청ID: ' + requestId);
        return;
      }

      const callbackName = '__gasResultCallback_' + requestId.replace(/[^a-zA-Z0-9_]/g, '_') + '_' + pollCount;
      let script = null;

      window[callbackName] = function(data) {
        cleanupJsonp(callbackName, script);

        if (!data || data.status === 'PENDING') {
          startPollingResult(requestId);
          return;
        }

        if (data.status === 'DONE' && data.success && data.result) {
          finishAsSuccess(data);
          return;
        }

        finishAsError((data.message || '검사 처리 중 문제가 발생했습니다. 다시 검사해 주세요.') + '\n요청ID: ' + requestId);
      };

      script = document.createElement('script');
      script.src = GAS_WEB_APP_URL +
        '?action=result' +
        '&requestId=' + encodeURIComponent(requestId) +
        '&callback=' + encodeURIComponent(callbackName) +
        '&t=' + Date.now();

      script.onerror = function() {
        cleanupJsonp(callbackName, script);
        startPollingResult(requestId);
      };

      document.body.appendChild(script);

      setTimeout(function() {
        if (window[callbackName]) {
          cleanupJsonp(callbackName, script);
          startPollingResult(requestId);
        }
      }, 9000);
    }

    function cleanupJsonp(callbackName, script) {
      try { delete window[callbackName]; } catch (e) { window[callbackName] = undefined; }
      if (script && script.parentNode) script.parentNode.removeChild(script);
    }

    async function finishAsSuccess(data) {
      clearTimeout(pollTimer);
      isAnalyzing = false;
      analyzeBtn.textContent = '검사';
      setControlsForAnalysis(false);
      try { if (stream) await video.play(); } catch (err) {}
      updateCameraButtonState();
      showResult(data.result);
    }

    async function finishAsError(message) {
      clearTimeout(pollTimer);
      isAnalyzing = false;
      analyzeBtn.textContent = '검사';
      setControlsForAnalysis(false);
      try { if (stream) await video.play(); } catch (err) {}
      updateCameraButtonState();
      showError(message);
    }

    function showResult(result) {
      const safe = normalizeClientResult(result || {});
      const isOk = safe.overall === 'OK';

      resultBox.className = 'resultBox ' + (isOk ? 'ok' : 'ng');
      resultSign.textContent = isOk ? 'OK' : 'NG';
      resultText.textContent = (safe.reason || '') + '\n' + (safe.action || '');
      helmetPill.textContent = '안전모 ' + safe.hardhat;
      strapPill.textContent = '턱끈 ' + safe.chinstrap;
      facePill.textContent = '감지 ' + (safe.personVisible ? 'Y' : 'N');
      setStatus('검사 완료');
    }

    function normalizeClientResult(result) {
      const hardhat = result.hardhat === 'OK' ? 'OK' : 'NG';
      const chinstrap = result.chinstrap === 'OK' ? 'OK' : 'NG';
      const personVisible = result.personVisible === true || hardhat === 'OK' || chinstrap === 'OK';
      const overall = hardhat === 'OK' && chinstrap === 'OK' && personVisible ? 'OK' : 'NG';

      return {
        overall: overall,
        hardhat: hardhat,
        chinstrap: chinstrap,
        personVisible: personVisible,
        reason: result.reason || (overall === 'OK' ? '안전모와 턱끈 착용이 확인되었습니다.' : '안전모와 턱끈 착용 상태를 확인해 주세요.'),
        action: result.action || (overall === 'OK' ? '출입 가능합니다.' : '안전모와 턱끈을 착용한 뒤 다시 검사해 주세요.')
      };
    }

    function showError(message) {
      resultBox.className = 'resultBox ng';
      resultSign.textContent = '오류';
      resultText.textContent = message || '검사 처리 중 문제가 발생했습니다. 다시 검사해 주세요.';
      helmetPill.textContent = '안전모 -';
      strapPill.textContent = '턱끈 -';
      facePill.textContent = '감지 -';
      setStatus(message || '검사 처리 중 문제가 발생했습니다. 다시 검사해 주세요.');
    }

    function clearResult() {
      resultBox.className = 'resultBox';
      resultSign.textContent = '';
      resultText.textContent = '';
      helmetPill.textContent = '안전모 -';
      strapPill.textContent = '턱끈 -';
      facePill.textContent = '감지 -';
    }

    function setStatus(message) {
      statusEl.textContent = message || '';
    }

    function toggleFaceBlur() {
      if (isAnalyzing) return;
      faceBlurApplied = !faceBlurApplied;
      updateFaceBlurBadge();
      if (!faceBlurApplied) clearFaceBlurCanvas();
    }

    function updateFaceBlurBadge() {
      privacyBadge.textContent = faceBlurApplied ? '얼굴 흐림 처리' : '얼굴 흐림 미적용';
      privacyBadge.classList.toggle('off', !faceBlurApplied);
    }

    function resizeFaceBlurCanvas() {
      const rect = cameraBox.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      if (!rect.width || !rect.height) return;

      const targetWidth = Math.round(rect.width * dpr);
      const targetHeight = Math.round(rect.height * dpr);

      if (faceBlurCanvas.width !== targetWidth || faceBlurCanvas.height !== targetHeight) {
        faceBlurCanvas.width = targetWidth;
        faceBlurCanvas.height = targetHeight;
        faceBlurCanvas.style.width = rect.width + 'px';
        faceBlurCanvas.style.height = rect.height + 'px';
      }
    }

    function clearFaceBlurCanvas() {
      const ctx = faceBlurCanvas.getContext('2d');
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, faceBlurCanvas.width, faceBlurCanvas.height);
    }

    function startFaceBlurLoop() {
      if (blurLoopStarted) return;
      blurLoopStarted = true;
      requestAnimationFrame(drawFaceBlurLoop);
    }

    async function drawFaceBlurLoop() {
      resizeFaceBlurCanvas();

      if (stream && video.videoWidth && video.videoHeight && !video.paused) {
        await updateFaceDetection();
        drawFaceBlurOverlay();
      }

      requestAnimationFrame(drawFaceBlurLoop);
    }

    async function updateFaceDetection() {
      const now = Date.now();
      if (!detectorReady || detectorUnavailable || !faceDetector) return;
      if (now - lastDetectionAt < FACE_DETECTION_INTERVAL) return;

      lastDetectionAt = now;

      try {
        const faces = await faceDetector.detect(video);
        lastDetectedFace = faces && faces.length ? faces[0].boundingBox : null;
      } catch (err) {
        lastDetectedFace = null;
        detectorUnavailable = true;
      }
    }

    function drawFaceBlurOverlay() {
      const dpr = window.devicePixelRatio || 1;
      const width = faceBlurCanvas.width / dpr;
      const height = faceBlurCanvas.height / dpr;
      const ctx = faceBlurCanvas.getContext('2d');

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, width, height);

      if (!faceBlurApplied) return;

      let faceBox;
      if (lastDetectedFace) {
        faceBox = mapVideoFaceToCanvas(lastDetectedFace, width, height);
      } else {
        faceBox = getFallbackFaceBox(width, height);
      }

      const blurBox = makePrivacyFaceBox(faceBox, width, height);
      drawBlurredVideoPatch(ctx, blurBox, width, height);
    }

    function drawBlurredVideoPatch(ctx, box, canvasWidth, canvasHeight) {
      const cover = getVideoCoverRect(canvasWidth, canvasHeight);

      ctx.save();
      makeOvalClip(ctx, box);
      ctx.filter = 'blur(36px)';
      ctx.translate(canvasWidth, 0);
      ctx.scale(-1, 1);
      ctx.drawImage(video, cover.x, cover.y, cover.width, cover.height);
      ctx.restore();

      ctx.save();
      makeOvalClip(ctx, box);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.22)';
      ctx.fill();
      ctx.restore();
    }

    function applyMirrorXForDisplay(x, width, canvasWidth) {
      return canvasWidth - (x + width);
    }

    function getVideoCoverRect(canvasWidth, canvasHeight) {
      const videoWidth = video.videoWidth;
      const videoHeight = video.videoHeight;
      const scale = Math.max(canvasWidth / videoWidth, canvasHeight / videoHeight);
      const width = videoWidth * scale;
      const height = videoHeight * scale;

      return {
        x: (canvasWidth - width) / 2,
        y: (canvasHeight - height) / 2,
        width: width,
        height: height
      };
    }

    function mapVideoFaceToCanvas(faceRect, canvasWidth, canvasHeight) {
      const face = readFaceRect(faceRect);
      const cover = getVideoCoverRect(canvasWidth, canvasHeight);
      const scale = cover.width / video.videoWidth;

      const rawX = cover.x + face.x * scale;
      const y = cover.y + face.y * scale;
      const width = face.width * scale;
      const height = face.height * scale;

      return {
        x: applyMirrorXForDisplay(rawX, width, canvasWidth),
        y: y,
        width: width,
        height: height
      };
    }

    function readFaceRect(faceRect) {
      return {
        x: typeof faceRect.x === 'number' ? faceRect.x : (faceRect.left || 0),
        y: typeof faceRect.y === 'number' ? faceRect.y : (faceRect.top || 0),
        width: faceRect.width || 0,
        height: faceRect.height || 0
      };
    }

    function getFallbackFaceBox(width, height) {
      const w = width * 0.30;
      const h = height * 0.39;

      return {
        x: (width - w) / 2,
        y: height * 0.34,
        width: w,
        height: h
      };
    }

    function makePrivacyFaceBox(box, limitWidth, limitHeight) {
      const cx = box.x + box.width / 2;
      const cy = box.y + box.height / 2 + box.height * 0.08;
      const width = Math.min(box.width * 0.96, limitWidth);
      const height = Math.min(box.height * 1.14, limitHeight);
      const x = Math.max(0, Math.min(cx - width / 2, limitWidth - width));
      const y = Math.max(0, Math.min(cy - height / 2, limitHeight - height));

      return { x: x, y: y, width: width, height: height };
    }

    function blurCanvasArea(ctx, sourceCanvas, box, blurAmount, drawStroke) {
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = sourceCanvas.width;
      tempCanvas.height = sourceCanvas.height;

      const tempCtx = tempCanvas.getContext('2d');
      tempCtx.drawImage(sourceCanvas, 0, 0);

      ctx.save();
      makeOvalClip(ctx, box);
      ctx.filter = 'blur(' + blurAmount + 'px)';
      ctx.drawImage(tempCanvas, 0, 0);
      ctx.filter = 'none';
      ctx.fillStyle = 'rgba(255, 255, 255, 0.20)';
      ctx.fill();
      if (drawStroke) {
        ctx.lineWidth = 2;
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.45)';
        ctx.stroke();
      }
      ctx.restore();
    }

    function makeOvalClip(ctx, box) {
      const x = box.x;
      const y = box.y;
      const w = box.width;
      const h = box.height;

      ctx.beginPath();
      if (ctx.ellipse) {
        ctx.ellipse(x + w / 2, y + h / 2, w / 2, h / 2, 0, 0, Math.PI * 2);
      } else {
        ctx.arc(x + w / 2, y + h / 2, Math.min(w, h) / 2, 0, Math.PI * 2);
      }
      ctx.closePath();
      ctx.clip();
    }
  </script>
</body>
